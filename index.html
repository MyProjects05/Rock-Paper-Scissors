<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <script src="javascripts.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Rock-Paper-Scissors</h1>
    <div id = "main">
        <div class = "animation">
            <div class = "text"></div>
            <div class = "visuals">
                <figcaption>Your Choice</figcaption>
                <div class = "my"></div>
                <div class = "pc"></div>
                <figcaption>Computer's choice</figcaption>
            </div>
        </div>
        <div class = "choices">
            <img src="rock.png" alt="Rock" id = "rock">
            <img src="paper.png" alt="Paper" id = "paper">
            <img src="scissors.png" alt="Scissors" id = "scissors">
        </div>
    </div>
</body>
</html>
